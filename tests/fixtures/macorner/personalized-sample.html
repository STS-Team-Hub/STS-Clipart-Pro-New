<div class="product-gallery"><img src="https://cdn.example/outside-gallery.jpg" alt="outside"></div>
<div id="customily-options">
  <div class="title-customize">PERSONALIZED</div>
  <div class="customily_option" sort-id="1" opt-id="g1">
    <div class="option_name">Option 1 of 4 Choose Style (0|20) * Required</div>
    <div class="swatch-container">
      <div class="customily-swatch"><input type="radio" id="s1" name="properties[Choose Style]" value="Classic"><label for="s1"><img src="https://cdn.example/style-classic.png" alt="Classic"></label></div>
      <div class="customily-swatch"><input type="radio" id="s2" name="properties[Choose Style]" value="Modern"><label for="s2" style="background-color: rgb(255, 0, 0)">Modern</label></div>
    </div>
  </div>
  <div class="customily_option" sort-id="2" opt-id="g2">
    <div class="option_name">Enter Name</div>
    <div class="cl-option-content"><label>Kid Name</label><input type="text" name="properties[Kid Name]" placeholder="Enter name" maxlength="20"></div>
  </div>
  <div class="customily_option" sort-id="3" opt-id="g3">
    <div class="option_name">Choose Quote</div>
    <select name="properties[Choose Quote]">
      <option value="">Select</option>
      <option value="Hello">Hello</option>
      <option value="World">World</option>
    </select>
  </div>
</div>
